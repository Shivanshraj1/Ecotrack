services:
  - type: web
    name: ecotrack-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: AUTH_SALT
        generateValue: true
      - key: OTP_TTL_MINUTES
        value: 10
      - key: LOGIN_CAPTCHA_MAX_FAILS
        value: 3
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
